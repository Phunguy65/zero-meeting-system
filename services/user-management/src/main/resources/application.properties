spring.application.name=user-management

# ─── Web config ───────────────────────────────────────────────────────────────
spring.mvc.apiversion.use.path-segment=1
spring.mvc.apiversion.default=1.0
spring.mvc.apiversion.supported=1.0

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/zms_users
spring.datasource.username=zms_user
spring.datasource.password=zms_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Override in production via environment variable: JWT_SECRET
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=2592000

# ─── Kafka ────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.cloudevents.kafka.CloudEventSerializer

# ─── Firebase ─────────────────────────────────────────────────────────────────
# Override in production via environment variables
app.firebase.project-id=${FIREBASE_PROJECT_ID:}
app.firebase.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}
