spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/h2-migration

app.jwt.secret=integration-test-secret-key-must-be-at-least-32-chars
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=2592000
